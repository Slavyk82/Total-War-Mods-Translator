name: i18n

on:
  pull_request:
    paths:
      - 'lib/i18n/**'
      - 'slang.yaml'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'test/i18n/**'
      - '.github/workflows/i18n.yml'
  push:
    branches: [main]
    paths:
      - 'lib/i18n/**'
      - 'slang.yaml'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'test/i18n/**'
      - '.github/workflows/i18n.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate slang and Riverpod code
        # slang must run first: the Riverpod-annotated provider references
        # AppLocale (generated by slang), so build_runner cannot resolve
        # types until strings.g.dart exists.
        run: |
          dart run slang
          dart run build_runner build --delete-conflicting-outputs

      - name: Run slang analyze
        run: dart run slang analyze

      - name: Run i18n tests
        run: flutter test test/i18n
